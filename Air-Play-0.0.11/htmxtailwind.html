<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind + HTMX Contact Page</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>
</head>
<body class="bg-white text-gray-800">

<main class="max-w-4xl mx-auto p-6 space-y-12">

  <!-- Header -->
  <header class="border-b pb-6">
    <h1 class="text-4xl font-bold mb-4">Welcome to My Simple Page</h1>
    <nav>
      <ul class="flex space-x-6 text-blue-600">
        <li><a href="#about" class="hover:underline">About</a></li>
        <li><a href="#contact" class="hover:underline">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- About Section -->
  <section id="about">
    <h2 class="text-2xl font-semibold mb-2">About</h2>
    <p class="text-lg text-gray-700">This is a minimal example using semantic HTML with Tailwind CSS and now... HTMX ✨</p>
  </section>

  <!-- Contact Form -->
  <section id="contact">
    <h2 class="text-2xl font-semibold mb-4">Contact</h2>

    <form
            hx-post="/contact"
            hx-target="#form-response"
            hx-swap="innerHTML"
            hx-indicator="#loading"
            class="space-y-4"
    >
      <div>
        <label for="name" class="block font-medium mb-1">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label for="email" class="block font-medium mb-1">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <button type="submit"
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Send Message
      </button>

      <!-- Loading indicator -->
      <div id="loading" class="text-sm text-gray-500 hidden" aria-live="polite">
        Sending...
      </div>
    </form>

    <!-- Response message will go here -->
    <div id="form-response" class="mt-4 text-green-600 font-medium"></div>
  </section>

  <!-- Footer -->
  <footer class="border-t pt-6 text-center text-sm text-gray-500">
    <p>&copy; 2025 Simple Site. All rights reserved.</p>
  </footer>

</main>

</body>
</html>
